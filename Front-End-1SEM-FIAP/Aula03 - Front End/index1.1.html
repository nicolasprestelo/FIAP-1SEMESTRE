<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./estilo1.1.css">
</head>
<body>
    <h1>Célula que abrange duas colunas</h1>
    <h2>Para fazer uma célula abranger mais de uma coluna, use um atribulo colspan</h2>
    <table style="width: 100%;">
        <tr>
            <th colspan="2">Nome</th>
            <th>Idade</th>
        </tr>
        <tr>
            <td>Will</td>
            <td>Smith</td>
            <td>53</td>
        </tr>
        <tr>
            <td>Bill</td>
            <td>Gates</td>
            <td>53</td>
        </tr>
    </table>
    <br><br>
    <table style="width: 100%;">
        <tr>
            <th>Nome</th>
            <td>João</td>
        </tr>
        <tr>
            <th rowspan="2">Telefone</th>
            <td>555-1234</td>
        </tr>
        <tr>
            <td>555-5678</td>
        </tr>
        </table>
</body>
</html>
